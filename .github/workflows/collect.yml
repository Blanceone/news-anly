name: 采集
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FETCH_INTERVAL_SECONDS: 60

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: news.db
          key: news-db
          restore-keys: news-db
      - name: Create env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}" >> .env
          echo "STOCK_WATCHLIST=${{ vars.STOCK_WATCHLIST }}" >> .env
          echo "FETCH_INTERVAL_SECONDS=${{ env.FETCH_INTERVAL_SECONDS }}" >> .env
      - name: Run collection (loop mode)
        run: python main.py run --loop
