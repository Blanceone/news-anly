name: 盘前汇总
on:
  schedule:
    - cron: '30 0 * * 1-5'  # 北京时间 08:30 (UTC 00:30)
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  pre-market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}" >> .env
          echo "STOCK_WATCHLIST=${{ vars.STOCK_WATCHLIST }}" >> .env
      - name: Run pre-market
        run: python main.py pre_market
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
